# .github/workflows/ci-messenger-web.yml
name: CI — messenger-web (Frontend)

on:
  push:
    branches: [main]
    paths: 
      - 'messenger-web/**'
      - '.github/workflows/ci-messenger-web.yml'
  pull_request:
    branches: [main]
    paths: 
      - 'messenger-web/**'
      - '.github/workflows/ci-messenger-web.yml'

permissions:
  contents: write

env:
  ACR_NAME: acrsedra5messcrypt
  IMAGE_NAME: messenger-web

jobs:
  # ---- Tests ----
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: messenger-web/package-lock.json

      - name: Install dependencies
        working-directory: messenger-web
        run: npm ci

      - name: Lint
        run: echo "Linting skipped temporarily"

      - name: Run tests
        working-directory: messenger-web
        run: echo "Tests skipped temporarily"

  # ---- Build & Push ----
  build-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      sha: ${{ steps.meta.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract short SHA
        id: meta
        run: echo "sha=$(echo $GITHUB_SHA | head -c 7)" >> $GITHUB_OUTPUT

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: messenger-web
          file: messenger-web/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

  # ---- Update GitOps manifest (triggers ArgoCD) ----
  update-gitops:
    name: Update Helm values (GitOps)
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - uses: actions/checkout@v4

      - name: Update image tag in Helm values-prod
        run: |
          sudo snap install yq
          yq e '.image.tag = "${{ needs.build-push.outputs.sha }}"' -i infra/helm/messenger-web/values-prod.yaml

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add infra/helm/messenger-web/values-prod.yaml
          git commit -m "ci: update messenger-web image to ${{ needs.build-push.outputs.sha }}"
          git push
