# .github/workflows/ci-messenger-api.yml
name: CI — messenger-api (Backend .NET 9)

on:
  push:
    branches: [main]
    paths: 
      - 'MessengerApp/**'
      - '.github/workflows/ci-messenger-api.yml'
  pull_request:
    branches: [main]
    paths: 
      - 'MessengerApp/**'
      - '.github/workflows/ci-messenger-api.yml'

permissions:
  contents: write

env:
  ACR_NAME: acrsedra5messcrypt
  IMAGE_NAME: messenger-api
  DOTNET_VERSION: '9.0.x'

jobs:
  # ---- Build & Test ----
  test:
    name: Build & Test .NET 9
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        working-directory: MessengerApp
        run: dotnet restore

      - name: Build
        working-directory: MessengerApp
        run: dotnet build -c Release --no-restore

      - name: Run Unit Tests
        working-directory: MessengerApp
        run: dotnet test tests/MessengerApp.UnitTests/ -c Release --no-build --verbosity normal

  # ---- Build & Push Docker ----
  build-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      sha: ${{ steps.meta.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract short SHA
        id: meta
        run: echo "sha=$(echo $GITHUB_SHA | head -c 7)" >> $GITHUB_OUTPUT

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: MessengerApp
          file: MessengerApp/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

  # ---- Update GitOps manifest (triggers ArgoCD) ----
  update-gitops:
    name: Update Helm values (GitOps)
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - uses: actions/checkout@v4

      - name: Update image tag in Helm values-prod
        run: |
          sudo snap install yq
          yq e '.image.tag = "${{ needs.build-push.outputs.sha }}"' -i infra/helm/messenger-api/values-prod.yaml

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add infra/helm/messenger-api/values-prod.yaml
          git commit -m "ci: update messenger-api image to ${{ needs.build-push.outputs.sha }}"
          git pull --rebase origin main
          git push
