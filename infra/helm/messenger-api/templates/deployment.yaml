apiVersion: apps/v1
kind: Deployment
metadata:
  name: messenger-api
  namespace: production
  labels:
    app: messenger-api
    version: {{ .Values.image.tag }}
spec:
{{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
{{- end }}

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0       # Zéro downtime
      maxSurge: 1

  selector:
    matchLabels:
      app: messenger-api

  template:
    metadata:
      labels:
        app: messenger-api
        version: {{ .Values.image.tag }}
        azure.workload.identity/use: "true"
    spec:
      # ---- Distribution multi-AZ (tolérance de panne) ----
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: messenger-api
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: messenger-api

      # ---- Anti-affinité : préférer distribuer les pods sur différents nodes ----
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [messenger-api]
                topologyKey: kubernetes.io/hostname

      nodeSelector: {}

      # Arrêt gracieux .NET (drain des connexions SignalR)
      terminationGracePeriodSeconds: 90

      initContainers:
        - name: run-migrations
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              export ConnectionStrings__DefaultConnection="Host=$PGHOST;Port=$PGPORT;Database=$PGDATABASE;Username=$PGUSER;Password=$PGPASSWORD"
              exec dotnet MessengerApp.API.dll
          envFrom:
            - configMapRef:
                name: messenger-api-config
          env:
            - name: RUN_MIGRATIONS
              value: "true"
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: messenger-cnpg-db-app
                  key: host
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: messenger-cnpg-db-app
                  key: port
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: messenger-cnpg-db-app
                  key: dbname
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: messenger-cnpg-db-app
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: messenger-cnpg-db-app
                  key: password
            - name: ConnectionStrings__Redis
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: redis-connection-string
            - name: Jwt__Secret
              valueFrom:
                secretKeyRef:
                  name: jwt-secrets
                  key: jwt-secret
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true

      containers:
        - name: messenger-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080    # .NET 9 écoute sur 8080
              name: http

          envFrom:
            - configMapRef:
                name: messenger-api-config
          command: ["/bin/sh", "-c"]
          args:
            - |
              export ConnectionStrings__DefaultConnection="Host=$PGHOST;Port=$PGPORT;Database=$PGDATABASE;Username=$PGUSER;Password=$PGPASSWORD"
              exec dotnet MessengerApp.API.dll
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: messenger-cnpg-db-app
                  key: host
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: messenger-cnpg-db-app
                  key: port
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: messenger-cnpg-db-app
                  key: dbname
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: messenger-cnpg-db-app
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: messenger-cnpg-db-app
                  key: password
            - name: ConnectionStrings__Redis
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: redis-connection-string
            - name: Jwt__Secret
              valueFrom:
                secretKeyRef:
                  name: jwt-secrets
                  key: jwt-secret

          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}

          # ---- Liveness : l'app est-elle en vie ? ----
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # ---- Readiness : DB + Redis OK ? ----
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          # ---- Startup : temps de démarrage .NET ----
          startupProbe:
            httpGet:
              path: /health/live
              port: 8080
            failureThreshold: 30
            periodSeconds: 10

          # Arrêt gracieux : laisser les connexions se vider
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "azure-keyvault-secrets"
