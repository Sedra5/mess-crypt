# k8s/storage-classes/premium.yaml
# Azure Premium SSD — utilisé par PostgreSQL et Redis
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: managed-premium
provisioner: disk.csi.azure.com
parameters:
  skuName: Premium_LRS
  kind: Managed
reclaimPolicy: Retain           # IMPORTANT : garder les données si PVC supprimé
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer   # Bind au premier pod (respect des zones AZ)
